[project]
name = "mcpscraper-sdk"
version = "0.13.1"
description = "Official Python client for all 165 mcpscraper.dev MCP tools and the REST API"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "requests>=2.31",
    "pydantic>=2.0",
]

[project.urls]
Repository = "https://github.com/VilovietaSEO/mcpscraper-sdk"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "responses>=0.25",
    "datamodel-code-generator>=0.25",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcpscraper"]
