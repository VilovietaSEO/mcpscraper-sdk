[project]
name = "mcpscraper-memory-sdk"
version = "0.2.0"
description = "Official Python clients for all 145 mcpscraper.dev MCP tools and the direct memory API"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "requests>=2.31",
    "pydantic>=2",
]

[project.urls]
Repository = "https://github.com/VilovietaSEO/mcpscraper-sdk"

[dependency-groups]
dev = [
    "pytest>=8",
    "responses>=0.25",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcpscraper_memory"]
